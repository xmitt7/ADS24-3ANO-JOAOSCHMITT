<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        function linkedList() {

            let head = null
            let tail = null
            let length = 0

            const Node = (value) => {
                return {
                    value,
                    next: null,
                    prev: null
                }
            }
            const add = (value) => {

                const newNode = Node(value)

                if (!head) {
                    head = newNode
                    tail = newNode
                    length++
                    return newNode
                }

                tail.next = newNode
                newNode.prev = tail
                tail = newNode

                length++
                return newNode
            }

            const remove = () => {

                if (!tail) return null

                const removed = tail

                if (head === tail) {
                    head = null
                    tail = null
                } else {
                    tail = tail.prev
                    tail.next = null
                }

                length--
                return removed.value
            }

            const printForward = () => {
                let node = head

                while (node) {
                    console.log(node.value)
                    node = node.next
                }
            }

            // percorrer do fim para o início
            const printBackward = () => {
                let node = tail

                while (node) {
                    console.log(node.value)
                    node = node.prev
                }
            }

            return {
                add,
                remove,
                printForward,
                printBackward,
                length: () => length
            }
        }



        const list = linkedList()
        console.log(list.length())
        list.add(1)
        list.add(2)
        list.add(3)
        list.add(4)
        list.add(5)
        list.add(6)
        list.add(7)
        list.add(8)
        list.add(9)
        list.add(10)
        list.add(11)
        list.add(12)
        list.add(13)

        list.remove()
        console.log(list.length())
        console.log("Percorrendo do início:")
        list.printForward()

        console.log("Percorrendo do final:")
        list.printBackward()

    </script>

</body>

</html>
