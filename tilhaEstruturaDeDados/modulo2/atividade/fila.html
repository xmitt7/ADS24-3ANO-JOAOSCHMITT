<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        class Queue {
            constructor() {
                this.items = []
            }

            enqueue(element) {
                this.items.push(element)
            }

            dequeue() {
                return this.items.shift()
            }

            front() {
                return this.items[0]
            }

            isEmpty() {
                return this.items.length === 0
            }

            size() {
                return this.items.length
            }
        }
        const fila = new Queue()

        fila.enqueue(10)
        fila.enqueue(20)
        fila.enqueue(30)

        console.log(fila.front()) // 10

        fila.dequeue()

        console.log(fila.front()) // 20
    </script>

</body>

</html>
