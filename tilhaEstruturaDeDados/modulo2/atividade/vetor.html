<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

    const lista= [1,2,3,4,5]
    const numero = prompt("escolha um numero "+lista)
    

function buscarnumero(lista,numero){
    return lista[numero-1]
}

function remover(lista,numero){
        lista.splice(numero-1,1)
        return lista
}
    
alert(buscarnumero(lista,numero))

alert(remover(lista,numero))
</script>




</body>
</html>
