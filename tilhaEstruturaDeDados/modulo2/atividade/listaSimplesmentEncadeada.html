<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        function linkedList() {

            let head = null
            let length = 0

            const Node = (value) => {
                return {
                    value,
                    next: null
                }
            }
            const add = (value) => {
                if (!head) {
                    head = Node(value)
                    length++
                    return head
                }
                let node = head
                while (node.next) {
                    node = node.next
                }
                node.next = Node(value)
                length++
                return node.next
            }
            const search = (value) => {
                let node = head

                while (node) {
                    if (node.value === value) {
                        return node
                    }
                    node = node.next
                }

                return null

            }
            return {
                length: () => length,
                add: (value) => add(value),
                search: (value) => search(value),
                print: () => console.log(head)
            }
        }
        const list = linkedList()
        console.log(list.length())
        list.add(1)
        list.add(2)
        list.add(3)
        console.log(list.search(1))
        console.log(list.search(6))

    </script> 
</body>

</html>
