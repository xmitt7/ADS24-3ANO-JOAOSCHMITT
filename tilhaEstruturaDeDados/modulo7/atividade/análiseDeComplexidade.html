<!DOCTYPE html>

<body>
    <script>
        function bubbleSort(arr){
            const n = arr.length;

            for(let i = 0; i< n - 1; i++){
                for(let j = 0; j< n -i -1; j++){
                    if(arr[j]> arr[j+1]){
                        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
                    }
                }
            }
            return arr;
        }

        const numbers3 = [3,5,2,1,8];
        console.log(bubbleSort(numbers3))
    </script>
    
</body>
</html>
