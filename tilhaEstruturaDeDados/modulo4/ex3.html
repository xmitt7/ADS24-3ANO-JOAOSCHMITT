<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        class MaxHeap {

            constructor() {
                this.heap = []
            }

            inserir(valor) {
                this.heap.push(valor)
                this.subir()
            }

            subir() {
                let indice = this.heap.length - 1

                while (indice > 0) {

                    let pai = Math.floor((indice - 1) / 2)

                    if (this.heap[pai] >= this.heap[indice]) break

                    [this.heap[pai], this.heap[indice]] =
                        [this.heap[indice], this.heap[pai]]

                    indice = pai
                }
            }

            remover() {

                if (this.heap.length === 1) {
                    return this.heap.pop()
                }

                const max = this.heap[0]

                this.heap[0] = this.heap.pop()

                this.descer(0)

                return max
            }

            descer(indice) {

                let tamanho = this.heap.length

                while (true) {

                    let esquerda = 2 * indice + 1
                    let direita = 2 * indice + 2
                    let maior = indice

                    if (esquerda < tamanho &&
                        this.heap[esquerda] > this.heap[maior]) {
                        maior = esquerda
                    }

                    if (direita < tamanho &&
                        this.heap[direita] > this.heap[maior]) {
                        maior = direita
                    }

                    if (maior === indice) break

                    [this.heap[indice], this.heap[maior]] =
                        [this.heap[maior], this.heap[indice]]

                    indice = maior
                }
            }
        }

        const fila = new MaxHeap()

        fila.inserir(10)
        fila.inserir(50)
        fila.inserir(30)
        fila.inserir(20)

        console.log("Maior:", fila.remover())
        console.log("Próximo:", fila.remover()) 
    </script>
</body>

</html>
